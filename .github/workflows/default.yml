name: Meridian
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install tools
        run: make tools
      - name: Run checks
        run: make check

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
      - name: Trigger Go module proxy and pkg.go.dev indexing
        run: curl -sSf --retry 5 --retry-all-errors 'https://proxy.golang.org/github.com/!andrey!senov/meridian/@v/'"$GITHUB_REF_NAME".info
